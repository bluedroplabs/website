            <li><strong>Web Development & Design:</strong> Custom website development, design, and user experience services</li>
            <li><strong>Managed Hosting:</strong> Web hosting, infrastructure management, and related technical support</li>
            <li><strong>Consulting & Strategy:</strong> Digital strategy, technical consulting, and ongoing support</li>
            <li><strong>Maintenance & Support:</strong> Ongoing maintenance, updates, and technical support for websites and applications</li>
          </ul>
