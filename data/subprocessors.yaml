# Subprocessors - Blue Drop Labs
# List of third-party subprocessors that process data on our behalf

title: "Subprocessors - Blue Drop Labs"
description: "A list of third-party subprocessors we use to deliver our services."
components:
  - type: GradientHero
    eyebrow: "Legal"
    title: "Subprocessors"
    description: "Third-party services that process data on our behalf."

  - type: Wysiwyg
    components:
      - type: RichText
        content: |
          <p><strong>Last Updated:</strong> March 2026</p>
          <p>When you use our website or services, we engage certain third-party subprocessors to help us operate our business. This page lists the subprocessors we use, the purpose of each, and where you can learn more about their data practices.</p>
          <p>We select subprocessors that meet our standards for security and privacy. We enter into data processing agreements where required and require subprocessors to protect your information in accordance with applicable law.</p>
          <p>We may update this list from time to time. If we add new subprocessors that materially affect how we process your data, we will update this page and, where appropriate, notify you through our Privacy Policy or other means.</p>

