# Contact Page Configuration
# This file defines the Contact page components section

title: "Contact Us - Blue Drop Labs"
description: "Get in touch with our team to discuss your project needs."
components:
  - type: GradientHero
    eyebrow: "LET'S BUILD SOMETHING GREAT TOGETHER"
    title: "Ready to start your next project?"
    description: "Tell us about your goals — we can't wait to hear what you're building."

  - type: ContactForm
    contactTitle: "Let's talk"
    contactDescription: "We're senior experts who love solving hard problems. Drop us a line and we'll get back to you fast — we're excited to hear from you."
    contactEmail: "hello@bluedroplabs.com"
    contactEmailHref: "mailto:hello@bluedroplabs.com"
    formAction: "/api/v1/contact"
    # bookCallLink:
    #   children: "Book a call"
    #   href: "#"
    fields:
      - name: fullName
        label: "Full Name"
        type: text
        required: true
      - name: email
        label: "Email address"
        type: email
        placeholder: "example@email.com"
        required: true
      - name: company
        label: "Company"
        type: text
        labelSuffix: "(optional)"
      - name: message
        label: "How can we help?"
        type: textarea
        placeholder: "Write your message here"
        required: true
    submitButtonText: "SEND MESSAGE"

  - type: GridSeparator
