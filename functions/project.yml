packages:
  - name: v1
    environment:
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY}"
      MAILCHIMP_API_KEY: "${MAILCHIMP_API_KEY}"
      MAILCHIMP_LIST_ID: "${MAILCHIMP_LIST_ID}"
      MANDRILL_API_KEY: "${MANDRILL_API_KEY}"
    functions:
      - name: newsletter
        runtime: nodejs:22
        web: true
        limits:
          timeout: 10000
          memory: 512
      - name: contact
        runtime: nodejs:22
        web: true
        limits:
          timeout: 10000
          memory: 512
